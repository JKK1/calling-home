name = "callhome"
compatibility_date = "2024-09-02"
pages_build_output_dir = "public"

# Cloudflare D1 — relational SQLite database
# Create with: wrangler d1 create callhome-db
# Then replace the database_id value below
[[d1_databases]]
binding      = "DB"
database_name = "callhome-db"
database_id  = "b0cdbe84-6cd1-4ec1-8ea3-7a645c1dd812"

[vars]
RATE_LIMIT_CREATE_PER_HOUR = "5"
RATE_LIMIT_READ_PER_MINUTE = "30"
